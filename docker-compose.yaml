version: '3.9'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: shop_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 364894
    ports:
      - "5432:5432"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DB_NAME: shop_db
      DB_USER: postgres
      DB_PASSWORD: 364894
      DB_HOST: db
      DB_PORT: 5432